<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Login - OneCampus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <video autoplay muted loop class="video-bg">
        <source src="aurora.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div class="login-card">
        <div class="profile-logo">
            <i class="fa-solid fa-store"></i>
        </div>
        <h2>Vendor Login</h2>
        <p style="text-align: center; color: rgba(255,255,255,0.8); margin-bottom: 20px; font-size: 0.9rem;">Manage your
            cafe orders and menu</p>

        <form id="vendorLoginForm">
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div id="message"
                style="color: #ff6b6b; text-align: center; margin-bottom: 10px; font-size: 0.85rem; display: none;">
            </div>

            <button type="submit" class="signin-btn" id="loginBtn">Login as Vendor</button>
        </form>

        <div class="divider"></div>

        <a href="vendor_signup.html" class="create-account-btn"
            style="text-decoration: none; text-align: center; display: block;">Register as new Vendor</a>

        <div style="text-align: center; margin-top: 15px;">
            <a href="login.html"
                style="color: rgba(255, 255, 255, 0.4); text-decoration: none; font-size: 0.8rem; transition: 0.3s;"
                onmouseover="this.style.color='#00ffcc'" onmouseout="this.style.color='rgba(255, 255, 255, 0.4)'">
                <i class="fa-solid fa-arrow-left" style="font-size: 0.7rem; margin-right: 5px;"></i> Back to Main Login
            </a>
        </div>
    </div>

    <script>
        document.getElementById('vendorLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const message = document.getElementById('message');
            const loginBtn = document.getElementById('loginBtn');

            message.style.display = 'none';
            loginBtn.textContent = 'Logging in...';
            loginBtn.disabled = true;

            try {
                const response = await fetch('/api/vendor/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('onecampus_user', JSON.stringify(data.user));
                    window.location.href = data.redirectUrl;
                } else {
                    message.innerText = data.message;
                    message.style.display = 'block';
                    loginBtn.textContent = 'Login as Vendor';
                    loginBtn.disabled = false;
                }
            } catch (err) {
                message.innerText = 'Login failed. Try again.';
                message.style.display = 'block';
                loginBtn.textContent = 'Login as Vendor';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
