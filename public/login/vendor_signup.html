<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Signup - OneCampus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <video autoplay muted loop class="video-bg">
        <source src="aurora.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div class="login-card signup-card">
        <div class="profile-logo">
            <i class="fa-solid fa-user-plus"></i>
        </div>
        <h2>Vendor Signup</h2>
        <p style="text-align: center; color: rgba(255,255,255,0.8); margin-bottom: 20px; font-size: 0.9rem;">Register
            your cafe to start receiving orders</p>

        <form id="vendorSignupForm">
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="fullName" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-store"></i>
                <input type="text" id="cafeName" placeholder="Cafe Name (e.g., Sai Food Court)" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="input-group" style="border: 1px solid #ff9f1c;">
                <i class="fa-solid fa-key" style="color: #ff9f1c;"></i>
                <input type="text" id="vendorKey" placeholder="Vendor Signup Key" required>
            </div>
            <div class="form-grid">
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required minlength="6">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required minlength="6">
                </div>
            </div>

            <div id="message" style="text-align: center; margin-bottom: 10px; font-size: 0.85rem; display: none;"></div>

            <button type="submit" class="signin-btn" id="signupBtn">Create Vendor Account</button>
        </form>

        <div class="divider"></div>

        <a href="vendor_login.html" class="create-account-btn"
            style="text-decoration: none; text-align: center; display: block;">Already a vendor? Login</a>
    </div>

    <script>
        document.getElementById('vendorSignupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const vendorKey = document.getElementById('vendorKey').value.trim();
            const cafeName = document.getElementById('cafeName').value.trim();
            const message = document.getElementById('message');
            const signupBtn = document.getElementById('signupBtn');

            if (password !== confirmPassword) {
                message.innerText = 'Passwords do not match';
                message.style.color = '#ff6b6b';
                message.style.display = 'block';
                return;
            }

            message.style.display = 'none';
            signupBtn.textContent = 'Creating Account...';
            signupBtn.disabled = true;

            try {
                const response = await fetch('/api/vendor/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password, confirmPassword, vendorKey, cafeName })
                });

                const data = await response.json();
                if (data.success) {
                    message.innerText = 'Registration successful! Redirecting to login...';
                    message.style.color = '#51cf66';
                    message.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'vendor_login.html';
                    }, 2000);
                } else {
                    message.innerText = data.message;
                    message.style.color = '#ff6b6b';
                    message.style.display = 'block';
                    signupBtn.textContent = 'Create Vendor Account';
                    signupBtn.disabled = false;
                }
            } catch (err) {
                message.innerText = 'Registration failed. Please try again.';
                message.style.color = '#ff6b6b';
                message.style.display = 'block';
                signupBtn.textContent = 'Create Vendor Account';
                signupBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
