<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Availability Portal - OneCampus</title>
    <link rel="stylesheet" href="Faculty_Aval.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <header class="main-header">
        <div class="container header-flex">
            <h1>OneCampus</h1>
            <div class="profile-logo">
                <i class="fas fa-user-circle"></i>
            </div>
        </div>
    </header>

    <nav class="sticky-nav">
        <div class="container">
            <ul>
                <li><a href="#hods">HODs</a></li>
                <li><a href="#cse">CSE Faculty</a></li>
                <li><a href="#ece">ECE Faculty</a></li>
                <li><a href="#mech">Mech Faculty</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">

        <!-- Faculty Sections container -->
        <div id="faculty-sections-container">
            <!-- Sections will be injected here -->
        </div>

        <script>
            async function loadFaculty() {
                try {
                    const response = await fetch('/api/auth/faculty');
                    const data = await response.json();
                    
                    if (data.success) {
                        renderFaculty(data.faculty);
                    }
                } catch (err) {
                    console.error('Error loading faculty:', err);
                }
            }

            function renderFaculty(faculty) {
                const container = document.getElementById('faculty-sections-container');
                container.innerHTML = '';

                // Group by department
                const departments = {};
                faculty.forEach(f => {
                    if (!departments[f.department]) {
                        departments[f.department] = [];
                    }
                    departments[f.department].push(f);
                });

                // Department Full Names Map
                const deptMap = {
                    'CSE': 'Computer Science Engineering',
                    'ECE': 'Electronics and Communication',
                    'MECH': 'Mechanical Engineering',
                    'DOS': 'Department of Sciences (Physics/Math)'
                };

                for (const dept in departments) {
                    const section = document.createElement('section');
                    section.id = dept.toLowerCase();
                    section.className = 'faculty-section';
                    
                    const title = document.createElement('h2');
                    title.className = 'section-title';
                    title.textContent = deptMap[dept] || dept;
                    section.appendChild(title);

                    const grid = document.createElement('div');
                    grid.className = 'faculty-grid';

                    departments[dept].forEach(f => {
                        const card = document.createElement('div');
                        card.className = 'faculty-card';
                        
                        // Pick a background color based on status
                        const statusClass = f.status.toLowerCase().replace(' ', '-');
                        
                        card.innerHTML = `
                            <div class="card-image">
                                <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(f.fullName)}&background=random" alt="${f.fullName}">
                            </div>
                            <div class="card-details">
                                <h3 class="faculty-name">${f.fullName}</h3>
                                <p class="faculty-dept">${f.designation}</p>
                                <ul class="info-list">
                                    <li><strong>Mail:</strong> ${f.email}</li>
                                    <li><strong>Cabin:</strong> ${f.cabin}</li>
                                    <li><strong>Focus:</strong> ${f.focusAreas}</li>
                                    <li><strong>Status:</strong> <span class="status ${statusClass}">${f.status}</span></li>
                                </ul>
                            </div>
                        `;
                        grid.appendChild(card);
                    });

                    section.appendChild(grid);
                    container.appendChild(section);
                }
            }

            // Load on start
            loadFaculty();
        </script>

    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 OneCampus - Faculty Availability Portal</p>
        </div>
    </footer>

</body>

</html>
