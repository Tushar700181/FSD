<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Availability Portal - OneCampus</title>
    <link rel="stylesheet" href="Faculty_Aval.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <header class="main-header">
        <div class="container header-flex">
            <h1>OneCampus</h1>
            <div class="profile-logo">
                <i class="fas fa-user-circle"></i>
            </div>
        </div>
    </header>

    <!-- Glass Search Bar Section -->
    <section class="container search-section">
        <div class="search-container">
            <i class="fas fa-search" style="color: var(--text-muted)"></i>
            <input type="text" id="facultySearch" placeholder="Search by name, expertise, or cabin..." oninput="filterFaculty()">
            <select id="deptFilter" onchange="filterFaculty()">
                <option value="all">All Departments</option>
                <option value="CSE">Computer Science</option>
                <option value="ECE">Electronics</option>
                <option value="MECH">Mechanical</option>
                <option value="DOS">Sciences</option>
            </select>
        </div>
    </section>

    <nav class="sticky-nav">
        <div class="container">
            <ul id="dept-nav">
                <!-- Dept links will be injected -->
            </ul>
        </div>
    </nav>

    <main class="container">
        <div id="faculty-sections-container">
            <div style="text-align: center; padding: 100px;">
                <i class="fas fa-spinner fa-spin" style="font-size: 3rem; color: var(--accent-teal)"></i>
                <p style="margin-top: 1rem; font-weight: 500;">Connecting to Campus Database...</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 OneCampus - Faculty Availability Portal</p>
        </div>
    </footer>

    <script>
        let allFaculty = [];

        async function loadFaculty() {
            try {
                const response = await fetch('/api/auth/faculty');
                const data = await response.json();
                
                if (data.success) {
                    allFaculty = data.faculty;
                    renderFaculty(allFaculty);
                }
            } catch (err) {
                console.error('Error loading faculty:', err);
                document.getElementById('faculty-sections-container').innerHTML = '<p style="text-align:center; color:red;">Connection error. Please try again.</p>';
            }
        }

        function filterFaculty() {
            const searchTerm = document.getElementById('facultySearch').value.toLowerCase();
            const deptFilter = document.getElementById('deptFilter').value;

            const filtered = allFaculty.filter(f => {
                const matchesSearch = f.fullName.toLowerCase().includes(searchTerm) || 
                                    f.focusAreas.toLowerCase().includes(searchTerm) ||
                                    f.cabin.toLowerCase().includes(searchTerm);
                const matchesDept = deptFilter === 'all' || f.department === deptFilter;
                return matchesSearch && matchesDept;
            });

            renderFaculty(filtered);
        }

        function renderFaculty(faculty) {
            const container = document.getElementById('faculty-sections-container');
            const nav = document.getElementById('dept-nav');
            container.innerHTML = '';
            nav.innerHTML = '';

            if (faculty.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 100px;"><i class="fas fa-search-minus" style="font-size:3rem; opacity:0.2;"></i><p>No matches found.</p></div>';
                return;
            }

            const departments = {};
            faculty.forEach(f => {
                if (!departments[f.department]) departments[f.department] = [];
                departments[f.department].push(f);
            });

            const deptMap = {
                'CSE': 'Computer Science Engineering',
                'ECE': 'Electronics and Communication',
                'MECH': 'Mechanical Engineering',
                'DOS': 'Department of Sciences'
            };

            for (const dept in departments) {
                // Add to Nav
                const li = document.createElement('li');
                li.innerHTML = `<a href="#${dept.toLowerCase()}">${dept}</a>`;
                nav.appendChild(li);

                // Create Section
                const section = document.createElement('section');
                section.id = dept.toLowerCase();
                section.className = 'faculty-section';
                
                section.innerHTML = `
                    <h2 class="section-title">
                        <i class="fas fa-university" style="color: var(--accent-teal)"></i>
                        ${deptMap[dept] || dept}
                    </h2>
                    <div class="faculty-grid">
                        ${departments[dept].map(f => {
                            const status = f.status.trim();
                            const statusClass = status.includes('Class') ? 'status-busy' : (status.includes('Meeting') ? 'status-meeting' : 'status-available');
                            return `
                                <div class="faculty-card">
                                    <div class="card-top">
                                        <img class="card-image" src="https://ui-avatars.com/api/?name=${encodeURIComponent(f.fullName)}&background=random" alt="${f.fullName}">
                                        <div class="faculty-header-info">
                                            <h3>${f.fullName}</h3>
                                            <p>${f.designation}</p>
                                        </div>
                                    </div>
                                    <ul class="info-list">
                                        <li><i class="fas fa-envelope"></i> ${f.email}</li>
                                        <li><i class="fas fa-door-open"></i> Cabin: ${f.cabin}</li>
                                        <li><i class="fas fa-microscope"></i> ${f.focusAreas}</li>
                                        <li style="justify-content: space-between; margin-top: 1rem;">
                                            <span style="font-weight: 600;">Status</span>
                                            <span class="status-badge ${statusClass}">${status}</span>
                                        </li>
                                    </ul>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(section);
            }
        }

        loadFaculty();
    </script>
</body>
</html>
