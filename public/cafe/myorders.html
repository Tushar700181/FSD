<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusEats - My Orders</title>
    <link rel="stylesheet" href="myorder.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-bowl-food"></i>
            </div>
            <ul class="nav-links">
                <li><a href="../landing/index.html" title="Home"><i class="fa-solid fa-house"></i></a></li>
                <li><a href="CafeM.html" title="Menu"><i class="fa-solid fa-utensils"></i></a></li>
                <li><a href="cart.html" title="Cart"><i class="fa-solid fa-cart-shopping"></i></a></li>
                <li class="active"><a href="myorders.html" title="My Orders"><i
                            class="fa-solid fa-clock-rotate-left"></i></a></li>
                <li><a href="profile.html" title="Profile"><i class="fa-solid fa-user"></i></a></li>
            </ul>
            <div class="logout">
                <a href="javascript:void(0)" onclick="logoutUser()" title="Logout"><i
                        class="fa-solid fa-arrow-right-from-bracket"></i></a>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="menu-content">
            <header class="top-header">
                <div class="header-text">
                    <span class="date" id="currentDate">June 15, 2023</span>
                    <h1>Campus<span>eats</span></h1>
                </div>

                <div class="header-search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search orders...">
                    <button onclick="fetchMyOrders()"
                        style="background:none; border:none; cursor:pointer; color:var(--primary-green); padding:0 10px;">
                        <i class="fa-solid fa-rotate"></i>
                    </button>
                </div>
            </header>

            <h2 class="main-title">My Orders</h2>

            <section class="order-section">
                <h2 class="sub-heading">Ongoing Orders <span id="ongoingCount"
                        style="background: var(--primary-green); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.8rem; vertical-align: middle;">0</span>
                </h2>
                <div id="ongoingOrdersList">
                    <!-- Dynamic Ongoing Orders -->
                    <p style="color: #888; padding: 20px;">Fetching active orders...</p>
                </div>
            </section>

            <section class="order-section">
                <h2 class="sub-heading">Order History</h2>
                <div id="pastOrdersList">
                    <!-- Dynamic Past Orders -->
                    <p style="color: #888; padding: 20px;">Fetching history...</p>
                </div>
            </section>
        </main>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('onecampus_user') || '{}');
        if (!user.id && !user._id) {
            window.location.href = '../login/login.html';
        }

        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

        async function fetchMyOrders() {
            const studentId = user.id || user._id;
            try {
                const res = await fetch(`/api/orders/my/${studentId}`);
                const data = await res.json();

                if (data.success) {
                    renderOrders(data.orders);
                } else {
                    console.error('Failed to fetch orders:', data.message);
                }
            } catch (err) {
                console.error('Error fetching orders:', err);
            }
        }

        function renderOrders(orders) {
            console.log('Rendering orders:', orders);
            const ongoingList = document.getElementById('ongoingOrdersList');
            const pastList = document.getElementById('pastOrdersList');
            const ongoingCount = document.getElementById('ongoingCount');

            const ongoing = orders.filter(o => {
                const s = (o.status || '').toLowerCase();
                return s === 'pending' || s === 'in progress' || s === 'processing';
            });

            const past = orders.filter(o => {
                const s = (o.status || '').toLowerCase();
                return s === 'done' || s === 'cancelled' || s === 'completed';
            });

            ongoingCount.innerText = ongoing.length;

            ongoingCount.innerText = ongoing.length;

            if (ongoing.length === 0) {
                ongoingList.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-mug-hot"></i>
                        <p>No active orders right now. Start ordering to see them here!</p>
                    </div>
                `;
            } else {
                ongoingList.innerHTML = ongoing.map(o => renderOrderCard(o, 'processing')).join('');
            }

            if (past.length === 0) {
                pastList.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-folder-open"></i>
                        <p>Your order history is empty. Time to grab a bite?</p>
                    </div>
                `;
            } else {
                pastList.innerHTML = past.map(o => renderOrderCard(o, 'history')).join('');
            }
        }

        function renderOrderCard(o, typeClass) {
            const date = new Date(o.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            const time = new Date(o.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            return `
                <div class="order-card ${typeClass}">
                    <div class="order-info">
                        <div class="info-group">
                            <strong>Order ID</strong>
                            <div class="detail-row">#${o._id.slice(-6).toUpperCase()}</div>
                            <div style="font-size: 0.75rem; color: #95a5a6; margin-top: 8px;">${date}, ${time}</div>
                        </div>
                        <div class="info-group">
                            <strong>Cafe</strong>
                            <div class="detail-row" style="color: var(--primary-green); font-weight: 600;">${o.cafeName}</div>
                        </div>
                        <div class="info-group">
                            <strong>Items</strong>
                            <div style="max-height: 80px; overflow-y: auto;">
                                ${o.items.map(i => `<div class="detail-row" style="font-size: 13px;">${i.name} <span style="color: #95a5a6; font-size: 11px;">x${i.qty}</span></div>`).join('')}
                            </div>
                        </div>
                        <div class="info-group">
                            <strong>Payment</strong>
                            <div class="detail-row" style="font-weight: 700;">₹${o.total}</div>
                            <div style="font-size: 0.75rem; color: #95a5a6; margin-top: 8px;">${o.paymentMethod}</div>
                        </div>
                        <div class="status-badge-container" style="text-align: right;">
                            <span class="status-badge status-${o.status.toLowerCase().replace(' ', '-')}">${o.status}</span>
                            ${typeClass === 'history' && (o.status.toLowerCase() === 'done' || o.status.toLowerCase() === 'completed') ? 
                                `<br><button class="rating-action-btn" style="margin-top: 10px;" onclick="openRatingModal('${o._id}')">Rate Items</button>` : ''
                            }
                        </div>
                    </div>
                </div>
            `;
        }

        // Rating Modal Logic
        let currentRatingOrderId = null;

        function openRatingModal(orderId) {
            currentRatingOrderId = orderId;
            const res = fetchMyOrders(); // Get fresh data
            // Since fetchMyOrders updates the UI, we should find the order in the local scope if cached
            // For simplicity, let's find it in the DOM or re-fetch specifically
            const orders = JSON.parse(sessionStorage.getItem('last_orders') || '[]');
            const order = orders.find(o => o._id === orderId);
            
            if (!order) return;

            const modal = document.getElementById('ratingOverlay');
            const list = document.getElementById('ratingItemsList');
            
            list.innerHTML = order.items.map(item => `
                <div class="rating-item" data-item-id="${item.id}">
                    <span style="font-weight: 600; font-size: 14px;">${item.name}</span>
                    <div class="stars" id="stars-${item.id}">
                        <i class="fa-solid fa-star" onclick="setRating('${item.id}', 1)"></i>
                        <i class="fa-solid fa-star" onclick="setRating('${item.id}', 2)"></i>
                        <i class="fa-solid fa-star" onclick="setRating('${item.id}', 3)"></i>
                        <i class="fa-solid fa-star" onclick="setRating('${item.id}', 4)"></i>
                        <i class="fa-solid fa-star" onclick="setRating('${item.id}', 5)"></i>
                    </div>
                </div>
            `).join('');
            
            modal.style.display = 'flex';
        }

        function setRating(itemId, val) {
            const container = document.getElementById(`stars-${itemId}`);
            const stars = container.querySelectorAll('i');
            container.setAttribute('data-value', val);
            stars.forEach((s, idx) => {
                if (idx < val) s.classList.add('active');
                else s.classList.remove('active');
            });
        }

        async function submitRatings() {
            const items = document.querySelectorAll('.rating-item');
            const submissions = [];
            
            items.forEach(el => {
                const itemId = el.getAttribute('data-item-id');
                const val = el.querySelector('.stars').getAttribute('data-value');
                if (val) {
                    submissions.push({ itemId, rating: Number(val) });
                }
            });

            if (submissions.length === 0) return alert('Please rate at least one item!');

            try {
                for (const sub of submissions) {
                    await fetch(`/api/menus/${sub.itemId}/rate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: user.id || user._id, rating: sub.rating })
                    });
                }
                alert('Thank you for your feedback!');
                closeRatingModal();
            } catch (err) {
                console.error('Submit ratings error:', err);
                alert('Failed to submit ratings.');
            }
        }

        function closeRatingModal() {
            document.getElementById('ratingOverlay').style.display = 'none';
        }

        async function fetchMyOrders() {
            const studentId = user.id || user._id;
            try {
                const res = await fetch(`/api/orders/my/${studentId}`);
                const data = await res.json();
                if (data.success) {
                    sessionStorage.setItem('last_orders', JSON.stringify(data.orders));
                    renderOrders(data.orders);
                }
            } catch (err) {
                console.error('Error fetching orders:', err);
            }
        }

        // Init
        fetchMyOrders();
        // setInterval(fetchMyOrders, 10000); // Polling disabled for manual refresh to avoid jitter
    </script>

    <!-- Rating Modal -->
    <div id="ratingOverlay" class="rating-overlay">
        <div class="rating-modal">
            <h3 style="margin-bottom: 20px; font-weight: 700;">Rate your meal</h3>
            <div id="ratingItemsList" style="margin-bottom: 25px;">
                <!-- Items injected here -->
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="closeRatingModal()" style="flex: 1; padding: 12px; border: none; background: #eee; border-radius: 12px; font-weight: 600; cursor: pointer;">Cancel</button>
                <button onclick="submitRatings()" style="flex: 2; padding: 12px; border: none; background: var(--primary-green); color: white; border-radius: 12px; font-weight: 600; cursor: pointer;">Submit Feedback</button>
            </div>
        </div>
    </div>

    <script src="auth_check.js"></script>
</body>

</html>
