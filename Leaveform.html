<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OneCampus - Leave Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    body {
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    
    .form-input {
      transition: all 0.2s ease;
      border: 2px solid #e5e7eb;
    }
    
    .form-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
      outline: none;
    }
    
    .status-badge {
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .history-card {
      animation: slideUp 0.4s ease forwards;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      transition: all 0.3s ease;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
    }
    
    .btn-secondary {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      transition: all 0.3s ease;
    }
    
    .btn-secondary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);
    }
    
    .card-shadow {
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    
    .card-shadow:hover {
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    
    .section-title {
      position: relative;
      display: inline-block;
    }
    
    .section-title::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 40px;
      height: 3px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border-radius: 2px;
    }
    
    .toast {
      animation: slideIn 0.3s ease, slideOut 0.3s ease 2.7s forwards;
    }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    @keyframes slideOut {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(100%); opacity: 0; }
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
 </head>
 <body class="h-full bg-gradient-to-br from-slate-50 via-indigo-50 to-purple-50">
  <div class="h-full overflow-auto">
   <div class="min-h-full w-full px-4 py-8 md:px-8"><!-- Header -->
    <header class="max-w-6xl mx-auto mb-8">
     <div class="flex items-center justify-between flex-wrap gap-4">
      <div class="flex items-center gap-3">
       <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
        </svg>
       </div>
       <div>
        <h1 id="app-title" class="text-2xl md:text-3xl font-extrabold text-gray-800">OneCampus</h1>
        <p id="app-subtitle" class="text-sm text-gray-500 font-medium">Leave &amp; Mess Rebate Management</p>
       </div>
      </div>
      <div id="form-status" class="status-badge px-4 py-2 rounded-full font-semibold text-sm flex items-center gap-2 bg-orange-100 text-orange-700"><span class="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></span> Incomplete
      </div>
     </div>
    </header><!-- Main Form Card -->
    <main class="max-w-6xl mx-auto">
     <div class="bg-white rounded-2xl card-shadow p-6 md:p-8 mb-8 transition-all duration-300">
      <form id="leave-form" class="space-y-8"><!-- Student Details Section -->
       <section>
        <h2 class="section-title text-lg font-bold text-gray-800 mb-6">Student Details</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
         <div><label class="block text-sm font-semibold text-gray-600 mb-2">Name <span class="text-red-500">*</span></label> <input type="text" id="name" required class="form-input w-full px-4 py-3 rounded-xl bg-gray-50" placeholder="Enter full name">
         </div>
         <div><label class="block text-sm font-semibold text-gray-600 mb-2">Roll Number <span class="text-red-500">*</span></label> <input type="text" id="roll_no" required class="form-input w-full px-4 py-3 rounded-xl bg-gray-50" placeholder="e.g., 21CS101">
         </div>
         <div><label class="block text-sm font-semibold text-gray-600 mb-2">Department</label> <input type="text" id="department" class="form-input w-full px-4 py-3 rounded-xl bg-gray-50" placeholder="e.g., Computer Science">
         </div>
         <div><label class="block text-sm font-semibold text-gray-600 mb-2">Semester</label> <select id="semester" class="form-input w-full px-4 py-3 rounded-xl bg-gray-50"> <option value="">Select Semester</option> <option value="1">1st Semester</option> <option value="2">2nd Semester</option> <option value="3">3rd Semester</option> <option value="4">4th Semester</option> <option value="5">5th Semester</option> <option value="6">6th Semester</option> <option value="7">7th Semester</option> <option value="8">8th Semester</option> </select>
         </div>
         <div><label class="block text-sm font-semibold text-gray-600 mb-2">Branch</label> <input type="text" id="branch" class="form-input w-full px-4 py-3 rounded-xl bg-gray-50" placeholder="e.g., CSE, ECE, ME">
         </div>
         <div><label class="block text-sm font-semibold text-gray-600 mb-2">Room Number</label> <input type="text" id="room_no" class="form-input w-full px-4 py-3 rounded-xl bg-gray-50" placeholder="e.g., A-101">
         </div>
         <div><label class="block text-sm font-semibold text-gray-600 mb-2">Cell Number</label> <input type="tel" id="cell_no" class="form-input w-full px-4 py-3 rounded-xl bg-gray-50" placeholder="Student contact">
         </div>
         <div><label class="block text-sm font-semibold text-gray-600 mb-2">Mobile Number</label> <input type="tel" id="mobile" class="form-input w-full px-4 py-3 rounded-xl bg-gray-50" placeholder="Alternate number">
         </div>
         <div><label class="block text-sm font-semibold text-gray-600 mb-2">Parent Name</label> <input type="text" id="parent_name" class="form-input w-full px-4 py-3 rounded-xl bg-gray-50" placeholder="Parent/Guardian name">
         </div>
         <div><label class="block text-sm font-semibold text-gray-600 mb-2">Parent Phone</label> <input type="tel" id="parent_phone" class="form-input w-full px-4 py-3 rounded-xl bg-gray-50" placeholder="Parent contact">
         </div>
         <div class="md:col-span-2"><label class="block text-sm font-semibold text-gray-600 mb-2">Address</label> <input type="text" id="address" class="form-input w-full px-4 py-3 rounded-xl bg-gray-50" placeholder="Home address">
         </div>
        </div>
       </section><!-- Leave Details Section -->
       <section>
        <h2 class="section-title text-lg font-bold text-gray-800 mb-6">Leave Details</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
         <div><label class="block text-sm font-semibold text-gray-600 mb-2">Leaving Date <span class="text-red-500">*</span></label> <input type="date" id="leaving_date" required class="form-input w-full px-4 py-3 rounded-xl bg-gray-50">
         </div>
         <div><label class="block text-sm font-semibold text-gray-600 mb-2">OUT Time <span class="text-red-500">*</span></label> <input type="time" id="out_time" required class="form-input w-full px-4 py-3 rounded-xl bg-gray-50">
         </div>
         <div><label class="block text-sm font-semibold text-gray-600 mb-2">Expected Return Date</label> <input type="date" id="expected_return_date" class="form-input w-full px-4 py-3 rounded-xl bg-gray-50">
         </div>
         <div class="md:col-span-2 lg:col-span-1"><label class="block text-sm font-semibold text-gray-600 mb-2">Reason for Leave</label> <select id="reason_for_leave" class="form-input w-full px-4 py-3 rounded-xl bg-gray-50"> <option value="">Select Reason</option> <option value="Medical">Medical</option> <option value="Family Emergency">Family Emergency</option> <option value="Personal Work">Personal Work</option> <option value="Festival/Holiday">Festival/Holiday</option> <option value="Academic">Academic</option> <option value="Other">Other</option> </select>
         </div>
        </div>
       </section><!-- Mess Rebate Section -->
       <section>
        <h2 class="section-title text-lg font-bold text-gray-800 mb-6">Mess Rebate Details</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
         <div><label class="block text-sm font-semibold text-gray-600 mb-2">Reason for Application</label> <select id="rebate_reason" class="form-input w-full px-4 py-3 rounded-xl bg-gray-50"> <option value="">Select Reason</option> <option value="Going Home">Going Home</option> <option value="Medical Leave">Medical Leave</option> <option value="Academic Trip">Academic Trip</option> <option value="Internship">Internship</option> <option value="Other">Other</option> </select>
         </div>
         <div><label class="block text-sm font-semibold text-gray-600 mb-2">Absence From</label> <input type="date" id="absence_from" class="form-input w-full px-4 py-3 rounded-xl bg-gray-50">
         </div>
         <div><label class="block text-sm font-semibold text-gray-600 mb-2">Absence To</label> <input type="date" id="absence_to" class="form-input w-full px-4 py-3 rounded-xl bg-gray-50">
         </div>
         <div><label class="block text-sm font-semibold text-gray-600 mb-2">Total Days</label> <input type="number" id="total_days" readonly class="form-input w-full px-4 py-3 rounded-xl bg-gray-100 font-bold text-indigo-600" value="0">
         </div>
        </div>
       </section><!-- Return Section -->
       <section>
        <h2 class="section-title text-lg font-bold text-gray-800 mb-6">Return Details</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-md">
         <div><label class="block text-sm font-semibold text-gray-600 mb-2">IN Date</label> <input type="date" id="in_date" class="form-input w-full px-4 py-3 rounded-xl bg-gray-50">
         </div>
         <div><label class="block text-sm font-semibold text-gray-600 mb-2">IN Time</label> <input type="time" id="in_time" class="form-input w-full px-4 py-3 rounded-xl bg-gray-50">
         </div>
        </div>
       </section><!-- Submit Buttons -->
       <div class="flex flex-wrap gap-4 pt-4"><button type="submit" id="submit-btn" class="btn-primary px-8 py-3 text-white font-bold rounded-xl flex items-center gap-2">
         <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
         </svg> Submit Leave </button> <button type="button" id="clear-btn" class="px-6 py-3 bg-gray-100 text-gray-700 font-bold rounded-xl hover:bg-gray-200 transition-all flex items-center gap-2">
         <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
         </svg> Clear Form </button>
       </div>
      </form>
     </div><!-- History Section -->
     <section class="mb-8">
      <div class="flex items-center justify-between mb-6">
       <h2 class="text-xl font-bold text-gray-800 flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
         <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
         </svg>
        </div> History of Past Forms</h2><span id="record-count" class="text-sm text-gray-500 font-medium bg-gray-100 px-3 py-1 rounded-full">0 Records</span>
      </div>
      <div id="history-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"><!-- History cards will be rendered here -->
      </div>
      <div id="empty-state" class="hidden bg-white rounded-2xl card-shadow p-12 text-center">
       <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-gray-100 flex items-center justify-center">
        <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
        </svg>
       </div>
       <h3 class="text-lg font-bold text-gray-700 mb-2">No Records Yet</h3>
       <p class="text-gray-500">Submit a leave form to see your history here</p>
      </div>
     </section><!-- Data Limit Warning -->
     <div id="limit-warning" class="hidden bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-xl mb-8">
      <div class="flex items-center gap-3">
       <svg class="w-6 h-6 text-yellow-600" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
       </svg>
       <p class="text-yellow-700 font-medium">Maximum record limit (999) reached. Please delete some records to add new ones.</p>
      </div>
     </div>
    </main><!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>
   </div>
  </div>
  </body>
  </html>
